<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <rect fill="#faf6f0" width="300" height="300" rx="16"/>
  <!-- Apple leaf -->
  <path d="M150 40 Q100 60 80 110 Q60 170 90 220 Q120 260 150 250 Q180 260 210 220 Q240 170 220 110 Q200 60 150 40Z" fill="#7cb342" opacity="0.85"/>
  <line x1="150" y1="50" x2="150" y2="240" stroke="#558b2f" stroke-width="2" opacity="0.6"/>
  <line x1="150" y1="100" x2="110" y2="130" stroke="#558b2f" stroke-width="1.5" opacity="0.4"/>
  <line x1="150" y1="150" x2="190" y2="175" stroke="#558b2f" stroke-width="1.5" opacity="0.4"/>
  <!-- Black rot lesions - concentric brown/black rings -->
  <circle cx="130" cy="130" r="22" fill="#3e2723" opacity="0.6"/>
  <circle cx="130" cy="130" r="17" fill="#5d4037" opacity="0.5"/>
  <circle cx="130" cy="130" r="12" fill="#3e2723" opacity="0.7"/>
  <circle cx="130" cy="130" r="7" fill="#1a1a1a" opacity="0.8"/>
  <!-- Second lesion -->
  <circle cx="175" cy="180" r="18" fill="#3e2723" opacity="0.6"/>
  <circle cx="175" cy="180" r="13" fill="#5d4037" opacity="0.5"/>
  <circle cx="175" cy="180" r="8" fill="#1a1a1a" opacity="0.75"/>
  <!-- Purple margins -->
  <circle cx="130" cy="130" r="24" fill="none" stroke="#4a148c" stroke-width="2" opacity="0.5"/>
  <circle cx="175" cy="180" r="20" fill="none" stroke="#4a148c" stroke-width="2" opacity="0.5"/>
  <!-- Yellowing -->
  <ellipse cx="105" cy="180" rx="15" ry="12" fill="#c8b44a" opacity="0.3"/>
  <text x="150" y="280" text-anchor="middle" fill="#555" font-size="14" font-family="sans-serif" font-weight="600">Apple Black Rot</text>
</svg>