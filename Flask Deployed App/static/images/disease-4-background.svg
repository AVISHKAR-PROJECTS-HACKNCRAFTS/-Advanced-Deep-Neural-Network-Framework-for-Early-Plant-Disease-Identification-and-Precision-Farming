<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <rect fill="#f5f5f5" width="300" height="300" rx="16"/>
  <!-- No leaf icon - camera with X -->
  <rect x="100" y="90" width="100" height="75" rx="12" fill="#bdbdbd" opacity="0.6"/>
  <circle cx="150" cy="125" r="22" fill="#9e9e9e" opacity="0.5"/>
  <circle cx="150" cy="125" r="16" fill="#bdbdbd" opacity="0.7"/>
  <circle cx="150" cy="125" r="8" fill="#757575" opacity="0.5"/>
  <rect x="120" y="90" width="25" height="8" rx="3" fill="#9e9e9e" opacity="0.6"/>
  <!-- X mark -->
  <line x1="120" y1="180" x2="180" y2="230" stroke="#e53935" stroke-width="4" opacity="0.7" stroke-linecap="round"/>
  <line x1="180" y1="180" x2="120" y2="230" stroke="#e53935" stroke-width="4" opacity="0.7" stroke-linecap="round"/>
  <!-- Warning icon -->
  <circle cx="240" cy="50" r="20" fill="#ff9800" opacity="0.85"/>
  <text x="240" y="58" text-anchor="middle" fill="white" font-size="24" font-family="sans-serif" font-weight="700">!</text>
  <text x="150" y="268" text-anchor="middle" fill="#757575" font-size="13" font-family="sans-serif" font-weight="600">No Leaf Detected</text>
  <text x="150" y="286" text-anchor="middle" fill="#9e9e9e" font-size="11" font-family="sans-serif">Please reupload with a leaf</text>
</svg>