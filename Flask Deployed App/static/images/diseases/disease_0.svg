<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <rect fill="#faf6f0" width="300" height="300" rx="16"/>
  <!-- Apple leaf shape -->
  <path d="M150 40 Q100 60 80 110 Q60 170 90 220 Q120 260 150 250 Q180 260 210 220 Q240 170 220 110 Q200 60 150 40Z" fill="#7cb342" opacity="0.85"/>
  <!-- Leaf vein -->
  <line x1="150" y1="50" x2="150" y2="240" stroke="#558b2f" stroke-width="2" opacity="0.6"/>
  <line x1="150" y1="100" x2="110" y2="130" stroke="#558b2f" stroke-width="1.5" opacity="0.4"/>
  <line x1="150" y1="100" x2="190" y2="130" stroke="#558b2f" stroke-width="1.5" opacity="0.4"/>
  <line x1="150" y1="150" x2="100" y2="175" stroke="#558b2f" stroke-width="1.5" opacity="0.4"/>
  <line x1="150" y1="150" x2="200" y2="175" stroke="#558b2f" stroke-width="1.5" opacity="0.4"/>
  <!-- Scab spots - olive green to brown irregular spots -->
  <ellipse cx="120" cy="100" rx="14" ry="10" fill="#6b5b3a" opacity="0.75"/>
  <ellipse cx="175" cy="120" rx="12" ry="9" fill="#5d4e37" opacity="0.7"/>
  <ellipse cx="135" cy="160" rx="16" ry="11" fill="#7a6b45" opacity="0.65"/>
  <ellipse cx="170" cy="190" rx="10" ry="8" fill="#6b5b3a" opacity="0.7"/>
  <ellipse cx="140" cy="210" rx="8" ry="6" fill="#5d4e37" opacity="0.6"/>
  <ellipse cx="110" cy="140" rx="9" ry="7" fill="#7a6b45" opacity="0.65"/>
  <!-- Yellowing around spots -->
  <ellipse cx="120" cy="100" rx="20" ry="16" fill="#c8b44a" opacity="0.2"/>
  <ellipse cx="135" cy="160" rx="22" ry="17" fill="#c8b44a" opacity="0.2"/>
  <text x="150" y="280" text-anchor="middle" fill="#555" font-size="14" font-family="sans-serif" font-weight="600">Apple Scab</text>
</svg>