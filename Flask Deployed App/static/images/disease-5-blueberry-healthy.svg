<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <rect fill="#f0fff0" width="300" height="300" rx="16"/>
  <!-- Healthy blueberry leaf - oval, smooth edges -->
  <ellipse cx="150" cy="140" rx="65" ry="95" fill="#4caf50" opacity="0.9" transform="rotate(-5,150,140)"/>
  <line x1="150" y1="50" x2="150" y2="230" stroke="#2e7d32" stroke-width="2.5" opacity="0.7"/>
  <line x1="150" y1="90" x2="110" y2="105" stroke="#388e3c" stroke-width="1.5" opacity="0.5"/>
  <line x1="150" y1="90" x2="190" y2="105" stroke="#388e3c" stroke-width="1.5" opacity="0.5"/>
  <line x1="150" y1="130" x2="100" y2="148" stroke="#388e3c" stroke-width="1.5" opacity="0.5"/>
  <line x1="150" y1="130" x2="200" y2="148" stroke="#388e3c" stroke-width="1.5" opacity="0.5"/>
  <line x1="150" y1="170" x2="108" y2="190" stroke="#388e3c" stroke-width="1.5" opacity="0.5"/>
  <line x1="150" y1="170" x2="192" y2="190" stroke="#388e3c" stroke-width="1.5" opacity="0.5"/>
  <!-- Small blueberry cluster -->
  <circle cx="80" cy="80" r="9" fill="#3949ab" opacity="0.8"/>
