  <!-- Checkmark -->
  <circle cx="240" cy="50" r="22" fill="#2e7d32" opacity="0.9"/>
  <path d="M228 50 L237 59 L254 42" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="150" y="280" text-anchor="middle" fill="#2e7d32" font-size="14" font-family="sans-serif" font-weight="600">Blueberry - Healthy</text>
</svg>