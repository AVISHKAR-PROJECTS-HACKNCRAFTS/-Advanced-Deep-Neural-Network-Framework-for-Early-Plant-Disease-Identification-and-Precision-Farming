  <ellipse cx="125" cy="105" rx="20" ry="14" fill="#e0e0e0" opacity="0.4"/>
  <ellipse cx="170" cy="150" rx="30" ry="20" fill="white" opacity="0.5"/>
  <ellipse cx="170" cy="150" rx="24" ry="16" fill="#e0e0e0" opacity="0.35"/>
  <ellipse cx="130" cy="195" rx="22" ry="15" fill="white" opacity="0.5"/>
  <ellipse cx="130" cy="195" rx="17" ry="11" fill="#e0e0e0" opacity="0.35"/>
  <!-- Leaf curling hint -->
  <path d="M210 140 Q225 135 220 150" stroke="#558b2f" stroke-width="1.5" fill="none" opacity="0.4"/>
  <text x="150" y="280" text-anchor="middle" fill="#555" font-size="13" font-family="sans-serif" font-weight="600">Cherry Powdery Mildew</text>
</svg>