  <path d="M150 35 Q95 55 75 115 Q55 180 95 225 Q130 260 150 250 Q170 260 205 225 Q245 180 225 115 Q205 55 150 35Z" fill="#7cb342" opacity="0.85"/>
  <line x1="150" y1="45" x2="150" y2="240" stroke="#558b2f" stroke-width="2" opacity="0.6"/>
  <line x1="150" y1="100" x2="105" y2="130" stroke="#558b2f" stroke-width="1.5" opacity="0.4"/>
  <line x1="150" y1="100" x2="195" y2="130" stroke="#558b2f" stroke-width="1.5" opacity="0.4"/>
  <line x1="150" y1="155" x2="100" y2="185" stroke="#558b2f" stroke-width="1.5" opacity="0.4"/>
  <line x1="150" y1="155" x2="200" y2="185" stroke="#558b2f" stroke-width="1.5" opacity="0.4"/>
  <!-- Powdery mildew - white/gray powdery patches -->
